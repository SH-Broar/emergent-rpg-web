<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>텍스트 검수</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Pretendard", "Noto Sans KR", sans-serif;
    background: #14151c; color: #e8e8ee;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header { padding: 0.9rem 1rem 0.5rem; display: flex; align-items: center; gap: 0.6rem; }
  header h1 { font-size: 1rem; color: #c08eff; flex: 1; font-weight: 600; }
  #progress { font-size: 0.85rem; color: #9a9aa8; font-variant-numeric: tabular-nums; }
  #bar { height: 3px; background: #2a2b36; }
  #bar > div { height: 100%; background: #c08eff; width: 0%; transition: width 160ms ease; }
  main { flex: 1; display: flex; flex-direction: column; padding: 1rem; gap: 0.8rem; overflow-y: auto; }
  .loc { font-size: 0.72rem; color: #7c7c8c; word-break: break-all; }
  .kind { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 10px;
          background: rgba(192,142,255,0.15); color: #c08eff; margin-bottom: 0.3rem; }
  .text {
    font-size: 1.15rem; line-height: 1.65; padding: 1.1rem 1rem;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    word-break: keep-all; overflow-wrap: break-word;
  }
  .text .sub { display: block; margin-top: 0.7rem; padding-top: 0.7rem; border-top: 1px dashed rgba(255,255,255,0.15);
               color: #8effb8; }
  .text .lbl { display: block; font-size: 0.7rem; color: #7c7c8c; margin-bottom: 0.2rem; }
  #reasons { display: none; flex-wrap: wrap; gap: 0.45rem; }
  #reasons.show { display: flex; }
  .chip {
    font-size: 0.85rem; padding: 0.5rem 0.85rem; border-radius: 18px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); color: #d6d6e0;
  }
  .chip.on { background: rgba(255,142,142,0.18); border-color: #ff8e8e; color: #ffb6b6; }
  #freetext {
    width: 100%; font: inherit; font-size: 0.95rem; padding: 0.6rem 0.8rem; border-radius: 10px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); color: inherit; display: none;
  }
  #freetext.show { display: block; }
  footer { padding: 0.7rem 1rem calc(0.9rem + env(safe-area-inset-bottom)); display: grid; gap: 0.55rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.55rem; }
  button {
    font: inherit; font-weight: 700; font-size: 1.05rem; padding: 0.95rem 0; border-radius: 12px;
    border: 1px solid transparent; color: #14151c; cursor: pointer;
  }
  #btnO { background: #8effb8; }
  #btnHold { background: #3a3b48; color: #d6d6e0; border-color: rgba(255,255,255,0.18); font-size: 0.9rem; }
  #btnX { background: #ff8e8e; }
  .row2 { display: grid; grid-template-columns: 1fr 2fr; gap: 0.55rem; }
  #btnBack { background: transparent; color: #9a9aa8; border-color: rgba(255,255,255,0.16); font-size: 0.9rem; }
  #btnConfirm { background: #c08eff; display: none; }
  #btnConfirm.show { display: block; }
  /* 완료 화면 */
  #done { display: none; flex: 1; padding: 1.2rem 1rem; flex-direction: column; gap: 1rem; }
  #done.show { display: flex; }
  #summary { font-size: 0.95rem; line-height: 1.7; color: #d6d6e0; }
  #out {
    flex: 1; width: 100%; font-family: ui-monospace, monospace; font-size: 0.72rem;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #b6b6c4; padding: 0.7rem; white-space: pre; overflow: auto;
  }
  #btnCopy { background: #8eedff; }
  #btnReset { background: transparent; color: #ff8e8e; border-color: rgba(255,142,142,0.4); font-size: 0.85rem; }
  #loading { padding: 2rem 1rem; color: #9a9aa8; text-align: center; line-height: 1.8; }
  #loading textarea { width: 100%; height: 9rem; margin-top: 0.8rem; font-size: 0.75rem;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; color: inherit; }
</style>
</head>
<body>
<header>
  <h1 id="title">텍스트 검수</h1>
  <span id="progress"></span>
</header>
<div id="bar"><div></div></div>

<div id="loading">불러오는 중...</div>

<main id="card" style="display:none">
  <div>
    <span class="kind" id="kind"></span>
    <div class="loc" id="loc"></div>
  </div>
  <div class="text" id="text"></div>
  <div id="reasons"></div>
  <input id="freetext" placeholder="사유 직접 입력 (선택)" autocomplete="off">
</main>

<div id="done">
  <div id="summary"></div>
  <textarea id="out" readonly></textarea>
  <button id="btnCopy">결과 복사</button>
  <button id="btnReset">처음부터 다시</button>
</div>

<footer id="controls" style="display:none">
  <div class="row">
    <button id="btnO">O</button>
    <button id="btnHold">보류</button>
    <button id="btnX">X</button>
  </div>
  <div class="row2">
    <button id="btnBack">← 이전</button>
    <button id="btnConfirm">사유 확정 →</button>
  </div>
</footer>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var dataset = params.get('d') || '';
  // 빠른 모드(q=1): X/보류도 사유 없이 1탭 기록 — 규칙 고정(보류=표현 수정, X=전면 재작성).
  var quick = params.get('q') === '1';
  var RAW_BASE = 'https://raw.githubusercontent.com/SH-Broar/emergent-rpg-web/rdc-roguelike-main/_review/';
  var CHIPS = ['어색함', '번역투', '수사+명사', '톤 안 맞음', '설명조', '의미 불명', '유치함', '밋밋함'];

  var items = [], meta = { title: '텍스트 검수' };
  var idx = 0, results = {}, storeKey = '';
  var pendingVerdict = null, chosenChips = [];

  var $ = function (id) { return document.getElementById(id); };

  function load() {
    if (!dataset) { return manualLoad('데이터셋 지정이 없습니다. JSON을 붙여넣어 시작할 수 있습니다.'); }
    fetch(RAW_BASE + dataset + '.json', { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(start)
      .catch(function () { manualLoad('불러오기 실패. JSON을 직접 붙여넣어 주세요.'); });
  }

  function manualLoad(msg) {
    var box = $('loading');
    box.innerHTML = msg + '<textarea id="paste" placeholder="검수 JSON 붙여넣기"></textarea><br><br>';
    var b = document.createElement('button');
    b.textContent = '시작';
    b.style.cssText = 'background:#c08eff;padding:0.7rem 2rem;border-radius:10px;font-weight:700;border:0';
    b.onclick = function () {
      try { start(JSON.parse($('paste').value)); }
      catch (e) { alert('JSON 형식이 아닙니다'); }
    };
    box.appendChild(b);
  }

  function start(data) {
    items = data.items || [];
    meta = data.meta || meta;
    storeKey = 'review-' + (data.meta && data.meta.id ? data.meta.id : dataset);
    try { results = JSON.parse(localStorage.getItem(storeKey) || '{}'); } catch (e) { results = {}; }
    idx = 0;
    while (idx < items.length && results[items[idx].n] != null) idx++;
    $('title').textContent = meta.title || '텍스트 검수';
    $('loading').style.display = 'none';
    var chipBox = $('reasons');
    CHIPS.forEach(function (c) {
      var s = document.createElement('button');
      s.className = 'chip'; s.textContent = c;
      s.onclick = function () {
        s.classList.toggle('on');
        var i = chosenChips.indexOf(c);
        if (i >= 0) chosenChips.splice(i, 1); else chosenChips.push(c);
      };
      chipBox.appendChild(s);
    });
    render();
  }

  function render() {
    pendingVerdict = null; chosenChips = [];
    $('reasons').classList.remove('show');
    $('freetext').classList.remove('show');
    $('freetext').value = '';
    $('btnConfirm').classList.remove('show');
    Array.prototype.forEach.call(document.querySelectorAll('.chip'), function (c) { c.classList.remove('on'); });

    var total = items.length, answered = Object.keys(results).length;
    $('progress').textContent = answered + ' / ' + total;
    $('bar').firstElementChild.style.width = (answered / Math.max(1, total) * 100) + '%';

    if (idx >= total) return finish();

    $('card').style.display = 'flex';
    $('controls').style.display = 'grid';
    $('done').classList.remove('show');

    var it = items[idx];
    $('kind').textContent = (it.kind || '') + '  ·  #' + it.n;
    $('loc').textContent = it.loc || '';
    var html = esc(it.text);
    if (it.proposal) {
      html = '<span class="lbl">현행</span>' + esc(it.text) +
             '<span class="sub"><span class="lbl">제안</span>' + esc(it.proposal) + '</span>';
    }
    $('text').innerHTML = html;
    window.scrollTo(0, 0);
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c];
    });
  }

  function record(verdict, reason) {
    results[items[idx].n] = { v: verdict, r: reason || '' };
    try { localStorage.setItem(storeKey, JSON.stringify(results)); } catch (e) {}
    idx++;
    render();
  }

  function askReason(verdict) {
    pendingVerdict = verdict;
    $('reasons').classList.add('show');
    $('freetext').classList.add('show');
    $('btnConfirm').classList.add('show');
  }

  $('btnO').onclick = function () { record('O'); };
  $('btnX').onclick = function () { if (quick) record('X'); else askReason('X'); };
  $('btnHold').onclick = function () { if (quick) record('?'); else askReason('?'); };
  $('btnConfirm').onclick = function () {
    var extra = $('freetext').value.trim();
    var reason = chosenChips.slice();
    if (extra) reason.push(extra);
    record(pendingVerdict, reason.join(', '));
  };
  $('btnBack').onclick = function () {
    if (idx === 0) return;
    idx--;
    delete results[items[idx].n];
    try { localStorage.setItem(storeKey, JSON.stringify(results)); } catch (e) {}
    render();
  };

  function finish() {
    $('card').style.display = 'none';
    $('controls').style.display = 'none';
    $('done').classList.add('show');
    var o = 0, x = 0, h = 0;
    var lines = ['## 검수 결과: ' + (meta.id || dataset)];
    items.forEach(function (it) {
      var r = results[it.n];
      if (!r) return;
      if (r.v === 'O') o++; else if (r.v === 'X') x++; else h++;
      lines.push('#' + it.n + ' ' + r.v + (r.r ? ' :: ' + r.r : ''));
    });
    var judged = o + x + h;
    $('summary').innerHTML = '완료! O <b style="color:#8effb8">' + o + '</b> · X <b style="color:#ff8e8e">' + x +
      '</b> · 보류 <b>' + h + '</b> (불합격률 ' + (judged ? Math.round(x / judged * 100) : 0) + '%)' +
      '<br>아래 결과를 복사해서 채팅에 붙여넣어 주세요.';
    $('out').value = lines.join('\n');
  }

  $('btnCopy').onclick = function () {
    var t = $('out');
    t.select(); t.setSelectionRange(0, 999999);
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(t.value).catch(function () {});
    $('btnCopy').textContent = '복사됨!';
    setTimeout(function () { $('btnCopy').textContent = '결과 복사'; }, 1500);
  };
  $('btnReset').onclick = function () {
    if (!confirm('이 검수의 저장된 판정을 모두 지울까요?')) return;
    results = {}; idx = 0;
    try { localStorage.removeItem(storeKey); } catch (e) {}
    render();
  };

  load();
})();
</script>
</body>
</html>
